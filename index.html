<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Crypto Lab - Final</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --neon: #00f2fe;
            --neon-pink: #e73c7e;
        }

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            background: #090a0f;
            color: white;
            min-height: 100vh;
        }

        /* Particles Background */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1b2735 0%, #090a0f 100%);
        }

        .particle {
            position: absolute;
            background: rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 5vw, 3rem);
            letter-spacing: 5px;
            background: linear-gradient(to right, #fff, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .card h2 { font-family: 'Orbitron', sans-serif; color: var(--neon); margin: 0 0 10px 0; }

        /* Exercise Content Area */
        .exercise-view {
            display: none;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .back-btn {
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }

        .algo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .algo-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            margin: 8px 0;
            outline: none;
        }

        input:focus { border-color: var(--neon); }

        .action-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--neon), #4facfe);
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            margin-top: 10px;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            border-left: 4px solid var(--neon);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            min-height: 20px;
        }
        .ex4-log {
            margin-top: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 260px;
            overflow-y: auto;
            padding: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
        }
        .log-line {
            opacity: 0;
            transform: translateY(6px);
            animation: lineIn .35s ease forwards;
            background: rgba(255,255,255,0.03);
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 6px;
            word-break: break-all;
        }
        .ex4-box.pulse {
            box-shadow: 0 0 0 0 rgba(0,242,254,0.5);
            animation: pulse 1.6s ease-in-out infinite;
        }
        @keyframes lineIn {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,242,254,0.35); }
            70% { box-shadow: 0 0 22px 6px rgba(0,242,254,0.0); }
            100% { box-shadow: 0 0 0 0 rgba(0,242,254,0.0); }
        }
    </style>
</head>
<body>

    <div class="background" id="bg-particles"></div>

    <div class="container">
        <!-- HEADER -->
        <div id="home-view">
            <h1>NEON CRYPTO LAB</h1>
            <div class="dashboard-grid">
                <div class="card" onclick="showEx(1)">
                    <h2>EX 01</h2>
                    <p>Vigenere & Affine Ciphers</p>
                </div>
                <div class="card" onclick="showEx(2)">
                    <h2>EX 02</h2>
                    <p>Playfair Substitution</p>
                </div>
                <div class="card" onclick="showEx(3)">
                    <h2>EX 03</h2>
                    <p>Number Theory Lab</p>
                </div>
                <div class="card" onclick="showEx(4)">
                    <h2>EX 04</h2>
                    <p>AES & DES Ciphers</p>
                </div>
                <div class="card" onclick="showEx(5)">
                    <h2>EX 05</h2>
                    <p>RSA with Tracing</p>
                </div>
                <div class="card" onclick="showEx(6)">
                    <h2>EX 06</h2>
                    <p>CMAC & SHA Hashing</p>
                </div>
            </div>
        </div>

        <!-- EXERCISE CONTAINER -->
        <div id="ex-container" class="exercise-view">
            <button class="back-btn" onclick="showHome()">← BACK TO DASHBOARD</button>
            <div id="ex-content" class="algo-grid"></div>
        </div>
    </div>

    <script>
        // Background Particles Logic
        const bg = document.getElementById('bg-particles');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 4 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 8 + 7) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            bg.appendChild(p);
        }

        function showEx(n) {
            document.getElementById('home-view').style.display = 'none';
            const container = document.getElementById('ex-container');
            const content = document.getElementById('ex-content');
            container.style.display = 'block';

            if(n === 1) {
                content.innerHTML = `
                    <div class="algo-box">
                        <h3>Vigenere Cipher</h3>
                        <input id="vT" placeholder="Plaintext">
                        <input id="vK" placeholder="Key">
                        <button class="action-btn" onclick="doVig()">ENCRYPT</button>
                        <div id="vR" class="result">Result: -</div>
                    </div>
                    <div class="algo-box">
                        <h3>Affine Cipher</h3>
                        <input id="aT" placeholder="Plaintext">
                        <input type="number" id="aA" placeholder="Key a (e.g. 5)">
                        <input type="number" id="aB" placeholder="Key b (e.g. 8)">
                        <button class="action-btn" onclick="doAff()">ENCRYPT</button>
                        <div id="aR" class="result">Result: -</div>
                    </div>`;
            } else if(n === 2) {
                content.innerHTML = `
                    <div class="algo-box" style="grid-column: 1/-1">
                        <h3>Playfair Cipher</h3>
                        <input id="pT" placeholder="Plaintext">
                        <input id="pK" placeholder="Key">
                        <button class="action-btn" onclick="doPF()">PROCESS</button>
                        <div id="pR" class="result">Result: -</div>
                    </div>`;
            } else if(n === 3) {
                content.innerHTML = `
                    <div class="algo-box">
                        <h3>Miller-Rabin</h3>
                        <input id="mI" type="number" placeholder="Enter number">
                        <button class="action-btn" onclick="doMR()">PRIME TEST</button>
                        <div id="mR" class="result">Result: -</div>
                    </div>
                    <div class="algo-box">
                        <h3>Euclidean GCD</h3>
                        <input id="gA" type="number" placeholder="Number A">
                        <input id="gB" type="number" placeholder="Number B">
                        <button class="action-btn" onclick="doGCD()">FIND GCD</button>
                        <div id="gR" class="result">Result: -</div>
                    </div>
                    <div class="algo-box">
                        <h3>Fermat Theorem</h3>
                        <p style="font-size:12px">a<sup>p-1</sup> ≡ 1 (mod p)</p>
                        <input id="fA" type="number" placeholder="Base (a)">
                        <input id="fP" type="number" placeholder="Prime (p)">
                        <button class="action-btn" onclick="doFermat()">VERIFY</button>
                        <div id="fRes" class="result">Result: -</div>
                    </div>`;
            } else if(n === 4) {
                content.innerHTML = `
                    <div class="algo-box ex4-box" id="ex4_box" style="grid-column: 1/-1">
                        <h3>EX4 – AES Visualizer (Custom)</h3>
                        <p style="font-size:12px; color:#888;">Key is 32 hex chars (128‑bit). Plaintext auto-padded to 16 bytes.</p>
                        <input id="ex4_plain" placeholder="Plaintext (e.g., hello)">
                        <input id="ex4_key" placeholder="Key (hex, 32 chars)">
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button id="ex4_run" class="action-btn" onclick="runEX4()">RUN</button>
                            <button id="ex4_clear" class="action-btn" style="background:linear-gradient(45deg,#e73c7e,#ff6b6b)" onclick="clearEX4()">CLEAR</button>
                        </div>
                        <div id="ex4_out" class="result">Ciphertext: -</div>
                        <div id="ex4_log" class="ex4-log"></div>
                    </div>
                    <div class="algo-box ex4-box" id="ex4_des_box" style="grid-column: 1/-1">
                        <h3>EX4 – DES Visualizer (Single DES)</h3>
                        <p style="font-size:12px; color:#888;">Plaintext & Key are 16 hex chars (64‑bit).</p>
                        <input id="ex4_des_plain" placeholder="Plaintext hex (16 chars)">
                        <input id="ex4_des_key" placeholder="Key hex (16 chars)">
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input id="ex4_des_rounds" type="number" min="1" max="16" value="16" placeholder="Rounds (1-16)" style="max-width:160px;">
                            <button id="ex4_des_run" class="action-btn" onclick="runEX4DES()">RUN</button>
                            <button id="ex4_des_clear" class="action-btn" style="background:linear-gradient(45deg,#e73c7e,#ff6b6b)" onclick="clearEX4DES()">CLEAR</button>
                        </div>
                        <div id="ex4_des_out" class="result">Ciphertext: -</div>
                        <div id="ex4_des_log" class="ex4-log"></div>
                    </div>`;
                const kp = document.getElementById('ex4_key');
                const pt = document.getElementById('ex4_plain');
                pt.value = 'hello';
                kp.value = '00112233445566778899aabbccddeeff';
                if (pt && kp) runEX4();
                const dp = document.getElementById('ex4_des_plain');
                const dk = document.getElementById('ex4_des_key');
                const dr = document.getElementById('ex4_des_rounds');
                if (dp && dk) {
                    dp.value = '0123456789ABCDEF';
                    dk.value = '133457799BBCDFF1';
                    if (dr) dr.value = 16;
                }
            } else if(n === 5) {
                content.innerHTML = `
                    <div class="algo-box ex4-box" id="ex5_key_box" style="grid-column: 1/-1">
                        <h3>EX5 – RSA Key Generation (Tracing)</h3>
                        <p style="font-size:12px; color:#888;">Use small primes for demo (e.g., p=61, q=53, e=17)</p>
                        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap:10px;">
                            <input id="ex5_p" type="number" placeholder="p (prime)">
                            <input id="ex5_q" type="number" placeholder="q (prime)">
                            <input id="ex5_e" type="number" placeholder="e (coprime to φ)">
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button id="ex5_key_run" class="action-btn" onclick="runEX5Keygen()">GENERATE KEYS</button>
                            <button id="ex5_key_clear" class="action-btn" style="background:linear-gradient(45deg,#e73c7e,#ff6b6b)" onclick="clearEX5Key()">CLEAR</button>
                        </div>
                        <div id="ex5_key_out" class="result">Public (e,n) / Private (d,n): -</div>
                        <div id="ex5_key_log" class="ex4-log"></div>
                    </div>
                    <div class="algo-box ex4-box" id="ex5_enc_box" style="grid-column: 1/-1">
                        <h3>EX5 – RSA Encrypt/Decrypt (Tracing)</h3>
                        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap:10px;">
                            <input id="ex5_msg" placeholder="Message (text or number)">
                            <input id="ex5_e2" type="number" placeholder="e">
                            <input id="ex5_d2" type="number" placeholder="d">
                            <input id="ex5_n2" type="number" placeholder="n">
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button id="ex5_enc_run" class="action-btn" onclick="runEX5Encrypt()">ENCRYPT</button>
                            <button id="ex5_dec_run" class="action-btn" style="background:linear-gradient(45deg,#e73c7e,#ff6b6b)" onclick="runEX5Decrypt()">DECRYPT</button>
                        </div>
                        <div id="ex5_enc_out" class="result">Output: -</div>
                        <div id="ex5_enc_log" class="ex4-log"></div>
                    </div>
                    <div class="algo-box ex4-box" id="ex5_dh_box" style="grid-column: 1/-1">
                        <h3>EX5 – Diffie–Hellman (Tracing)</h3>
                        <p style="font-size:12px; color:#888;">p (prime), g (generator), a & b are private integers</p>
                        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap:10px;">
                            <input id="ex5_dh_p" type="number" placeholder="p">
                            <input id="ex5_dh_g" type="number" placeholder="g">
                            <input id="ex5_dh_a" type="number" placeholder="Alice a">
                            <input id="ex5_dh_b" type="number" placeholder="Bob b">
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button id="ex5_dh_run" class="action-btn" onclick="runEX5DH()">RUN</button>
                            <button id="ex5_dh_clear" class="action-btn" style="background:linear-gradient(45deg,#e73c7e,#ff6b6b)" onclick="clearEX5DH()">CLEAR</button>
                        </div>
                        <div id="ex5_dh_out" class="result">Shared Key: -</div>
                        <div id="ex5_dh_log" class="ex4-log"></div>
                    </div>`;
                const p = document.getElementById('ex5_p');
                const q = document.getElementById('ex5_q');
                const e = document.getElementById('ex5_e');
                const msg = document.getElementById('ex5_msg');
                if (p && q && e && msg) {
                    p.value = 61;
                    q.value = 53;
                    e.value = 17;
                    msg.value = 'HELLO';
                    runEX5Keygen();
                }
                const pdh = document.getElementById('ex5_dh_p');
                const gdh = document.getElementById('ex5_dh_g');
                const adh = document.getElementById('ex5_dh_a');
                const bdh = document.getElementById('ex5_dh_b');
                if (pdh && gdh && adh && bdh) {
                    pdh.value = 23;
                    gdh.value = 5;
                    adh.value = 6;
                    bdh.value = 15;
                }
            } else if(n === 6) {
                content.innerHTML = `
                    <div class="algo-box ex4-box" id="ex6_cmac_box" style="grid-column: 1/-1">
                        <h3>EX6 – CMAC (Cipher-based MAC)</h3>
                        <p style="font-size:12px; color:#888;">Generates authentication tag using AES-based CMAC</p>
                        <input id="ex6_cmac_key" placeholder="Enter Key (any text)">
                        <textarea id="ex6_cmac_msg" rows="2" placeholder="Enter Message (any text)"></textarea>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button id="ex6_cmac_run" class="action-btn" onclick="runEX6CMAC()">GENERATE CMAC</button>
                            <button id="ex6_cmac_clear" class="action-btn" style="background:linear-gradient(45deg,#e73c7e,#ff6b6b)" onclick="clearEX6CMAC()">CLEAR</button>
                        </div>
                        <div id="ex6_cmac_out" class="result">CMAC Tag: -</div>
                        <div id="ex6_cmac_log" class="ex4-log"></div>
                    </div>
                    <div class="algo-box ex4-box" id="ex6_sha_box" style="grid-column: 1/-1">
                        <h3>EX6 – SHA Hashing (256/512)</h3>
                        <p style="font-size:12px; color:#888;">Cryptographic hash using SHA-256 or SHA-512</p>
                        <input id="ex6_sha_input" placeholder="Enter Text or Message">
                        <select id="ex6_sha_algo" style="width:100%; padding:12px; margin:8px 0; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; color:white;">
                            <option value="SHA-256">SHA-256</option>
                            <option value="SHA-512">SHA-512</option>
                        </select>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button id="ex6_sha_run" class="action-btn" onclick="runEX6SHA()">HASH</button>
                            <button id="ex6_sha_clear" class="action-btn" style="background:linear-gradient(45deg,#e73c7e,#ff6b6b)" onclick="clearEX6SHA()">CLEAR</button>
                        </div>
                        <div id="ex6_sha_out" class="result">Hash Output: -</div>
                        <div id="ex6_sha_log" class="ex4-log"></div>
                    </div>`;
            }
        }

        function showHome() {
            document.getElementById('ex-container').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }

        // --- EX6 CMAC & SHA LOGIC ---
        async function runEX6CMAC() {
            const box = document.getElementById('ex6_cmac_box');
            const out = document.getElementById('ex6_cmac_out');
            const logC = document.getElementById('ex6_cmac_log');
            const btn = document.getElementById('ex6_cmac_run');
            const keyVal = document.getElementById('ex6_cmac_key').value;
            const msgVal = document.getElementById('ex6_cmac_msg').value;
            
            logC.innerHTML = "";
            out.innerText = "CMAC Tag: -";
            
            if (!keyVal || !msgVal) {
                out.innerText = "Error: Enter both Key and Message";
                return;
            }
            
            btn.disabled = true;
            box.classList.add('pulse');
            const encoder = new TextEncoder();
            
            try {
                // Step 1: Hash the key to 128-bit
                const keyBuf = encoder.encode(keyVal);
                const hashBuf = await crypto.subtle.digest('SHA-256', keyBuf);
                const aesKeyRaw = new Uint8Array(hashBuf).slice(0, 16);
                const hexKey = Array.from(aesKeyRaw).map(b => b.toString(16).padStart(2, '0')).join('');
                
                const line1 = document.createElement('div');
                line1.className = 'log-line';
                line1.textContent = 'Step 1: Key hashed to 128-bit AES Key: ' + hexKey;
                logC.appendChild(line1);
                logC.scrollTop = logC.scrollHeight;
                
                // Step 2: Prepare message
                const msgBuf = encoder.encode(msgVal);
                const line2 = document.createElement('div');
                line2.className = 'log-line';
                line2.textContent = 'Step 2: Message size: ' + msgBuf.byteLength + ' bytes';
                logC.appendChild(line2);
                logC.scrollTop = logC.scrollHeight;
                
                // Step 3: Initialize IV
                const iv = new Uint8Array(16);
                const line3 = document.createElement('div');
                line3.className = 'log-line';
                line3.textContent = 'Step 3: IV (zero): ' + Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join('');
                logC.appendChild(line3);
                logC.scrollTop = logC.scrollHeight;
                
                // Step 4-5: AES-CBC Encryption
                const line4 = document.createElement('div');
                line4.className = 'log-line';
                line4.textContent = 'Step 4-5: AES-128 CBC mode encryption...';
                logC.appendChild(line4);
                logC.scrollTop = logC.scrollHeight;
                
                const cryptoKey = await crypto.subtle.importKey('raw', aesKeyRaw, { name: 'AES-CBC' }, false, ['encrypt']);
                const encrypted = await crypto.subtle.encrypt({ name: 'AES-CBC', iv: iv }, cryptoKey, msgBuf);
                const resArray = new Uint8Array(encrypted);
                
                const finalHex = Array.from(resArray.slice(-16)).map(b => b.toString(16).padStart(2, '0')).join('');
                
                const line5 = document.createElement('div');
                line5.className = 'log-line';
                line5.textContent = 'Final CMAC Tag Generated';
                logC.appendChild(line5);
                logC.scrollTop = logC.scrollHeight;
                
                out.innerText = "CMAC Tag: " + finalHex.toUpperCase();
                
            } catch (e) {
                out.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
                box.classList.remove('pulse');
            }
        }

        function clearEX6CMAC() {
            const out = document.getElementById('ex6_cmac_out');
            const logC = document.getElementById('ex6_cmac_log');
            out.innerText = "CMAC Tag: -";
            logC.innerHTML = "";
        }

        async function runEX6SHA() {
            const box = document.getElementById('ex6_sha_box');
            const out = document.getElementById('ex6_sha_out');
            const logC = document.getElementById('ex6_sha_log');
            const btn = document.getElementById('ex6_sha_run');
            const input = document.getElementById('ex6_sha_input').value;
            const algo = document.getElementById('ex6_sha_algo').value;
            
            logC.innerHTML = "";
            out.innerText = "Hash Output: -";
            
            if (!input) {
                out.innerText = "Error: Enter text to hash";
                return;
            }
            
            btn.disabled = true;
            box.classList.add('pulse');
            const encoder = new TextEncoder();
            
            try {
                const line1 = document.createElement('div');
                line1.className = 'log-line';
                line1.textContent = 'Algorithm: ' + algo;
                logC.appendChild(line1);
                logC.scrollTop = logC.scrollHeight;
                
                const inputBuf = encoder.encode(input);
                const line2 = document.createElement('div');
                line2.className = 'log-line';
                line2.textContent = 'Input size: ' + inputBuf.byteLength + ' bytes';
                logC.appendChild(line2);
                logC.scrollTop = logC.scrollHeight;

            box.classList.add('pulse');
            const res = desEncrypt(p, k, roundsVal);
            let i = 0;
            const pushNext = () => {
                if (i < res.steps.length) {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.textContent = res.steps[i++];
                    logC.appendChild(line);
                    logC.scrollTop = logC.scrollHeight;
                    setTimeout(pushNext, 110);
                } else {
                    out.innerText = "Ciphertext: " + res.ciphertext;
                    runBtn.disabled = false;
                    box.classList.remove('pulse');
                }
            };
            pushNext();
        }
        function clearEX4DES() {
            const out = document.getElementById('ex4_des_out');

        }
        function gcd(a,b){while(b!==0){[a,b]=[b,a%b]}return a}
        function extendedGCD(a,b){if(b===0)return[a,1,0];let t=extendedGCD(b,a%b);let g=t[0],x1=t[1],y1=t[2];let x=y1;let y=x1-Math.floor(a/b)*y1;return[g,x,y]}
        function modInverse(e,phi){let t=extendedGCD(e,phi);let g=t[0],x=t[1];if(g!==1)throw new Error("e and phi not coprime");return((x%phi)+phi)%phi}
        function modExp(base,exp,mod){let r=1;base%=mod;while(exp>0){if(exp%2===1)r=(r*base)%mod;base=(base*base)%mod;exp=Math.floor(exp/2)}return r}
        function fermatPrimalityTest(n){let steps=[];steps.push("=== Fermat Test for "+n+" ===");if(n<=1)return[false,steps];if(n===2)return[true,steps];let a=2;steps.push("Base a = "+a);let g=gcd(a,n);steps.push("gcd("+a+", "+n+") = "+g);if(g!==1)return[false,steps];let res=modExp(a,n-1,n);steps.push(a+"^"+(n-1)+" mod "+n+" = "+res);return[res===1,steps]}
        function binaryExponentiationTrace(base,exponent,mod){let steps=[];steps.push("Compute "+base+"^"+exponent+" mod "+mod);let result=1;base%=mod;while(exponent>0){steps.push("Base="+base+", Exp="+exponent+", Result="+result);if(exponent%2===1){result=(result*base)%mod;steps.push("→ Multiply → Result="+result)}base=(base*base)%mod;exponent=Math.floor(exponent/2)}steps.push("Final Result = "+result);return[result,steps]}
        function rsaKeyGeneration(p,q,e){let steps=[];let ftP=fermatPrimalityTest(p);let isP=ftP[0];steps.push(...ftP[1]);let ftQ=fermatPrimalityTest(q);let isQ=ftQ[0];steps.push(...ftQ[1]);if(!isP||!isQ)throw new Error("p or q not prime");let n=p*q;let phi=(p-1)*(q-1);steps.push("n = "+n);steps.push("phi = "+phi);if(gcd(e,phi)!==1)throw new Error("e not coprime with phi");let d=modInverse(e,phi);steps.push("Public Key: ("+e+", "+n+")");steps.push("Private Key: ("+d+", "+n+")");return{n,phi,d,steps}}
        function rsaEncryptAuto(message,e,n){let steps=[];if(/^\d+$/.test(message)){let num=parseInt(message);let t=binaryExponentiationTrace(num,e,n);let cipher=t[0],expSteps=t[1];steps.push(...expSteps);return[cipher.toString(),steps]}let ascii=[...message].map(ch=>ch.charCodeAt(0));let cipherVals=[];for(let val of ascii){let t=binaryExponentiationTrace(val,e,n);let c=t[0],expSteps=t[1];cipherVals.push(c);steps.push(...expSteps)}return[cipherVals.join(" "),steps]}
        function rsaDecryptAuto(cipherInput,d,n){let steps=[];if(/^\d+$/.test(cipherInput)){let num=parseInt(cipherInput);let t=binaryExponentiationTrace(num,d,n);let plain=t[0],expSteps=t[1];steps.push(...expSteps);return[plain.toString(),steps]}let parts=cipherInput.split(" ").map(Number);let chars=[];for(let c of parts){let t=binaryExponentiationTrace(c,d,n);let p=t[0],expSteps=t[1];chars.push(String.fromCharCode(p));steps.push(...expSteps)}return[chars.join(""),steps]}
        function runEX5Keygen(){
            const box=document.getElementById('ex5_key_box');

            btn.disabled=true;box.classList.add('pulse');
            try{
                const res=rsaKeyGeneration(p,q,e);
                const n=res.n,d=res.d,steps=res.steps;
                document.getElementById('ex5_e2').value=e;
                document.getElementById('ex5_n2').value=n;
                document.getElementById('ex5_d2').value=d;
                let i=0;
                const pushNext=()=>{
                    if(i<steps.length){
                        const line=document.createElement('div');line.className='log-line';line.textContent=steps[i++];logC.appendChild(line);logC.scrollTop=logC.scrollHeight;setTimeout(pushNext,110);
                    }else{
                        out.innerText="Public: ("+e+", "+n+") | Private: ("+d+", "+n+")";
                        btn.disabled=false;box.classList.remove('pulse');
                    }
                };

                out.innerText="Error: "+err.message;btn.disabled=false;box.classList.remove('pulse');

        function runEX5Encrypt(){

            let i=0;

        function runEX5Decrypt(){
            const box=document.getElementById('ex5_enc_box');
            const out=document.getElementById('ex5_enc_out');
            const logC=document.getElementById('ex5_enc_log');
            const btn=document.getElementById('ex5_dec_run');

            logC.innerHTML="";out.innerText="Output: -";
            if(!cipher||!(d>1&&n>1)){out.innerText="Error: Enter cipher/plain space numbers for decrypt, d, n";return}
            btn.disabled=true;box.classList.add('pulse');
            const t=rsaDecryptAuto(cipher,d,n);const plain=t[0],steps=t[1];
            let i=0;
            const pushNext=()=>{
                if(i<steps.length){
                    const line=document.createElement('div');line.className='log-line';line.textContent=steps[i++];logC.appendChild(line);logC.scrollTop=logC.scrollHeight;setTimeout(pushNext,110);
                }else{

        function modExpTrace(base, exponent, mod){
            let steps=[];let result=1;base%=mod;steps.push("Compute "+base+"^"+exponent+" mod "+mod);
            while(exponent>0){
                steps.push("Base="+base+", Exp="+exponent+", Result="+result);
                if(exponent%2===1){result=(result*base)%mod;steps.push("→ Multiply → Result="+result)}
                base=(base*base)%mod;exponent=Math.floor(exponent/2);
            }
            steps.push("Final Result = "+result);return[result,steps];
        }
        function diffieHellman(p,g,a,b){
            let steps=[];steps.push("=== Diffie-Hellman Key Exchange ===");
            steps.push("Prime (p): "+p);steps.push("Generator (g): "+g);
            steps.push("Alice Private Key (a): "+a);steps.push("Bob Private Key (b): "+b);
            let Ares=modExpTrace(g,a,p);let A=Ares[0],stepsA=Ares[1];
            let Bres=modExpTrace(g,b,p);let B=Bres[0],stepsB=Bres[1];
            steps.push("--- Alice Computes Public Key ---");steps.push(...stepsA);steps.push("Alice Public Key (A = g^a mod p): "+A);
            steps.push("--- Bob Computes Public Key ---");steps.push(...stepsB);steps.push("Bob Public Key (B = g^b mod p): "+B);
            let K1res=modExpTrace(B,a,p);let key1=K1res[0],stepsK1=K1res[1];
            let K2res=modExpTrace(A,b,p);let key2=K2res[0],stepsK2=K2res[1];
            steps.push("--- Alice Computes Shared Key ---");steps.push(...stepsK1);steps.push("Shared Key (K = B^a mod p): "+key1);
            steps.push("--- Bob Computes Shared Key ---");steps.push(...stepsK2);steps.push("Shared Key (K = A^b mod p): "+key2);
            if(key1===key2){steps.push("✅ SUCCESS: Shared keys match!")}else{steps.push("❌ ERROR: Keys do not match")}
            return {publicKeyAlice:A, publicKeyBob:B, sharedKey:key1, steps};
        }
        function runEX5DH(){
